<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conceptual Session(MS-5)</title>

    <!-- tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#EEEEEE] min-h-screen">
    <header>
      <section class="pt-7 mb-5 container mx-auto px-5">
        <h1 class="text-5xl text-[#4ADD7F] font-bold text-center">
          Choose Your Trees
        </h1>
      </section>
    </header>

    <main>
      <section class="container mx-auto px-5">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-7.5">
          <!-- category btn section -->
          <div
            class="max-h-fit col-span-3 p-3 bg-[white] rounded-xl lg:sticky lg:-top-12 lg:z-50"
          >
            <h2 class="mb-3 text-2xl font-medium text-center">Categories</h2>
            <button
              id="default-active"
              class="mb-2 btn active w-full font-medium"
            >
              All Trees
            </button>

            <div id="category-btn-container" class="space-y-2">
              <!-- show all btn by loaded from database -->
            </div>
          </div>

          <!-- all trees section -->
          <div class="col-span-6 p-3 bg-[white] rounded-xl">
            <!-- loading -->
            <div
              id="loading-sec"
              class="h-20 hidden items-center justify-center"
            >
              <span class="loading loading-spinner text-[#4ADD7F]"></span>
            </div>

            <!-- all trees -->
            <div
              id="all-trees-container"
              class="grid grid-cols-1 sm:grid-cols-2 gap-4"
            >
              <!-- show all trees loaded by API -->
            </div>

            <!-- modal -->
            <div>
              <!-- Open the modal using ID.showModal() method -->
              <dialog id="tree-modal" class="modal">
                <div class="modal-box">
                  <div id="tree-modal-container"></div>

                  <div class="modal-action">
                    <form method="dialog">
                      <!-- if there is a button in form, it will close the modal -->
                      <button class="btn">Close</button>
                    </form>
                  </div>
                </div>
              </dialog>
            </div>
          </div>

          <!-- cart section -->
          <div
            class="max-h-fit col-span-3 p-3 bg-[white] rounded-xl space-y-10 lg:sticky lg:top-0 lg:z-20"
          >
            <div class="mt-2 flex justify-between items-center">
              <h2 class="text-2xl font-medium">Cart</h2>
              <div class="relative">
                <i class="fa-solid fa-cart-shopping mr-3 text-xl"></i>
                <span
                  id="cart-icon-count"
                  class="inline-block bg-[#EEEEEE] px-2 rounded-full font-medium absolute -top-4 right-0.5"
                ></span>
              </div>
            </div>

            <!-- cart-container -->
            <div id="cart-container" class="space-y-3">
              
            </div>

            <!-- cart empty text -->
            <div
              id="empty-text-content"
              class="flex flex-col justify-center items-center text-center"
            >
              <p class="text-gray-600 font-medium opacity-70">
                Your cart is empty.
              </p>
              <p class="text-gray-600 font-medium opacity-70">
                Add trees to get started.
              </p>
            </div>

            <!-- total amount section -->
            <div class="py-2 px-4 bg-[#EEEEEE] rounded-lg">
              <div class="flex justify-between items-center">
                <span class="inline-block text-xl font-medium">Total:</span>
                <span class="inline-block text-xl font-medium">
                  $<span id="total-amount" class="inline-block">0</span>
                </span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- JS -->
    <script src="./js/script.js"></script>
  </body>
</html>
